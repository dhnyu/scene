schema_version: "1.0"
project_name: scene
timezone: Asia/Seoul

paths:
  project_root: ..
  canonical_schema: ../docs/contracts/canonical_schema.yaml
  input_root: ~/fusedata/seoul
  external_root: ~/fuse_external
  output_root: ../outputs
  reports_dir: ../reports
  logs_dir: ../logs
  metadata_dir: ../metadata
  resolved_config_dir: ../artifacts/resolved-configs
  tmp_dir: ../tmp

storage:
  geometry_format: geopackage
  tabular_format: parquet
  parquet_compression: zstd
  resolved_config_format: yaml
  run_summary_format: json
  miniature_raster_format: geotiff
  source_raster_policy: read_only_reference
  geopackage_usage: inspection_and_archive
  per_scene_pt_files: forbidden
  training_cache_format: open

district_assignment:
  assignment_version: seoul-district-v1
  assignment_seed: 20260723
  counts:
    train: 15
    validation: 5
    test: 5
  canonical_boundary:
    path: ../outputs/boundaries/20260724_023225_KST/seoul_administrative_boundaries.gpkg
    layer: seoul_sigungu
    content_hash: 813e822a298a7a32ed88cf30a89aabe36bcc50b8ce85e44a79a6985c1dc4d8f6
  balancing_sources:
    building_geometry_path: ../outputs/buildings/20260724_005325_KST/building_geometry.gpkg
    building_geometry_layer: buildings
    road_geometry_path: ../outputs/roads/20260724_011159_KST/road_geometry.gpkg
    road_geometry_layer: road_links
    poi_geometry_path: ../outputs/pois/20260724_012951_KST/poi_geometry.gpkg
    poi_geometry_layer: pois
    poi_attributes_path: ../outputs/pois/20260724_012951_KST/poi_attributes.parquet
    landcover_source_name: seoul_landcover
    dem_source_name: seoul_dem
  scene_policy:
    epsg: 5186
    scene_side_length_m: 500.0
    scene_stride_m: 250.0
    grid_origin_m: [0.0, 0.0]
    cross_split_buffer_m: 250.0
  optimizer:
    algorithm_version: constrained-search-v1
    candidate_count: 50000
    spatial_cluster_count: 5
    context_cluster_count: 5
    validation_test_min_context_clusters: 3
    validation_test_component_min: 2
    validation_test_component_max: 3
    objective_weights:
      extensive_balance: 1.0
      density_balance: 0.75
      category_distribution: 0.75
      landcover_distribution: 1.0
      dem_distribution: 0.5
      context_diversity: 0.5
      spatial_diversity: 0.5

sources:
  - source_name: seoul_boundary
    category: administrative_boundaries
    kind: vector
    path: seoul_boundary.gpkg
    layer: seoul_boundary
  - source_name: seoul_boundary_buffer400
    category: administrative_boundaries
    kind: vector
    path: seoul_boundary_buffer400.gpkg
    layer: seoul_boundary_buffer400
  - source_name: seoul_buildings_geometry
    category: buildings
    kind: vector
    path: seoul_buildings_vworld.gpkg
    layer: seoul_buildings_vworld
  - source_name: seoul_buildings_attributes
    category: buildings
    kind: tabular
    path: seoul_buildings_vworld_attributes.parquet
  - source_name: seoul_roads_links
    category: roads
    kind: vector
    path: seoul_itslink.gpkg
    layer: seoul_itslink
  - source_name: seoul_roads_nodes
    category: roads
    kind: vector
    path: seoul_itsnode.gpkg
    layer: seoul_itsnode
  - source_name: seoul_poi_geometry
    category: pois
    kind: vector
    path: seoul_poi_ngii_clean.gpkg
    layer: seoul_poi_ngii_clean
  - source_name: seoul_poi_attributes
    category: pois
    kind: tabular
    path: seoul_poi_ngii_clean.parquet
  - source_name: seoul_landcover
    category: landcover
    kind: raster
    path: seoul_landcover_egis2025.tif
  - source_name: seoul_dem
    category: dem
    kind: raster
    path: seoul_srtm2014.tif
  - source_name: koreanadm_2024q2_sigungu
    category: administrative_boundaries
    kind: vector
    path: /mnt/hdd002/fusedatalarge/geodata/koreanadm/koreanadm_2024_2Q.gpkg
    layer: sigungu
    source_format: geopackage
    source_crs: EPSG:5179
    administrative_level: sigungu
    geographic_scope: south_korea
    expected_geometry_type: MultiPolygon
    expected_feature_count: 252
    read_only: true
    canonical_adapter: seoul_district_boundary
